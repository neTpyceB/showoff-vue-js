apiVersion: apps/v1
kind: Deployment
metadata:
  name: social-web
spec:
  replicas: 3
  selector:
    matchLabels:
      app: social-web
  template:
    metadata:
      labels:
        app: social-web
    spec:
      containers:
        - name: social-web
          image: ghcr.io/example/social-web:latest
          ports:
            - containerPort: 3000
          env:
            - name: FEED_SERVICE_URL
              value: http://feed-service:4101
            - name: PROFILE_SERVICE_URL
              value: http://profile-service:4102
            - name: DISCOVERY_SERVICE_URL
              value: http://discovery-service:4103
---
apiVersion: v1
kind: Service
metadata:
  name: social-web
spec:
  selector:
    app: social-web
  ports:
    - port: 80
      targetPort: 3000
