services:
  feed:
    build:
      context: .
      dockerfile: services/Dockerfile
    command: node services/feed-index.mjs
    ports:
      - '4101:4101'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4101/health']
      interval: 5s
      timeout: 3s
      retries: 10

  profile:
    build:
      context: .
      dockerfile: services/Dockerfile
    command: node services/profile-index.mjs
    ports:
      - '4102:4102'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4102/health']
      interval: 5s
      timeout: 3s
      retries: 10

  discovery:
    build:
      context: .
      dockerfile: services/Dockerfile
    command: node services/discovery-index.mjs
    ports:
      - '4103:4103'
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:4103/health']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    environment:
      FEED_SERVICE_URL: http://feed:4101
      PROFILE_SERVICE_URL: http://profile:4102
      DISCOVERY_SERVICE_URL: http://discovery:4103
      NUXT_PUBLIC_FEED_STREAM_URL: http://localhost:4101/events
    ports:
      - '5173:5173'
    depends_on:
      feed:
        condition: service_healthy
      profile:
        condition: service_healthy
      discovery:
        condition: service_healthy
