name: Delivery

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build

  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: stable
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize infra/k8s > /tmp/social-platform-k8s.yaml
      - run: go install github.com/yannh/kubeconform/cmd/kubeconform@latest
      - run: $(go env GOPATH)/bin/kubeconform -strict -summary /tmp/social-platform-k8s.yaml
