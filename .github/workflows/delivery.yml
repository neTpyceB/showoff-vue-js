name: Delivery

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-images:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: docker/setup-buildx-action@v3
      - run: docker compose build

  validate-k8s:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: azure/setup-kubectl@v4
      - run: kubectl kustomize infra/k8s > /tmp/social-platform-k8s.yaml
      - run: kubectl apply --dry-run=client --validate=false -f /tmp/social-platform-k8s.yaml
